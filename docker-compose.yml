version: "3.9"

services:
  frontend:
    image: jupyter-frontend:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - frontend_node_modules:/app/node_modules # Attach frontend node_modules volume

  backend:
    image: jupyter-backend:dev
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "5001:5000"
    volumes:
      - backend_data:/app/data
      - users_data:/app/users
      - notebooks_data:/app/notebooks
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=5000
      - JWT_SECRET=a-very-secure-secret-for-dev
      - NOTEBOOK_IMAGE=jupyter-singleuser:dev
      - NOTEBOOK_PORT=8888
      - NOTEBOOK_BASE_URL_PREFIX=/jupyter
      - DOCKER_NOTEBOOK_NETWORK=${COMPOSE_PROJECT_NAME:-colab-clone}_default
      - DOCKER_SOCKET_PATH=/var/run/docker.sock

volumes:
  notebooks_data:
  backend_data:
  frontend_node_modules:
  users_data:
